name: CI Build and Feature Tests

on:
  push:
    branches: [ "master", "main", "feature/*" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  WEIYUN_MCP_TOKEN: ${{ secrets.WEIYUN_MCP_TOKEN }}

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with: { python-version: '3.10' }
    - run: pip install requests
    - run: python -m unittest test_weiyun_api.py
      working-directory: ./python

  test-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4
      with: { go-version: '1.20' }
    - run: go test ./...
      working-directory: ./go

  test-php:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: shivammathur/setup-php@v2
      with: { php-version: '8.1', tools: phpunit }
    - run: phpunit tests
      working-directory: ./php

  test-list:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install requests
    - run: python integration_tests.py --test list
      working-directory: ./python

  test-upload:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install requests
    - run: python integration_tests.py --test upload
      working-directory: ./python

  test-download:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install requests
    - run: python integration_tests.py --test download
      working-directory: ./python

  test-delete:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: pip install requests
    - run: python integration_tests.py --test delete
      working-directory: ./python
